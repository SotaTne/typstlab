name: Monitor Toolchain Update

on:
  schedule:
    # 毎週月曜日の朝 6:30 JST (21:30 UTC)
    - cron: "30 21 * * 0"
  workflow_dispatch:
    # 手動実行用

jobs:
  monitor-toolchain-update:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: install
        run: bun install
        working-directory: .github/scripts

      - name: build
        run: bun run build:index
        working-directory: .github/scripts

      - name: Monitor Toolchain Update
        uses: actions/github-script@v9
        with:
          script: |
            const { jobMonitorToolchainUpdate } = await import('${{ github.workspace }}/.github/scripts/dist/index.js');
            await jobMonitorToolchainUpdate({ github, context, core });
